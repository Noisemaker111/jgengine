name: Vercel Deploy Logs

# Observability only — this workflow prints the Vercel build log for each main
# commit into its job summary. It does NOT gate: a Vercel deploy that reports
# ERROR is already surfaced red by the "Vercel" commit status and CI's
# `web-build` job, so this run stays green rather than double-reporting the same
# failure. It only goes red when it cannot do its job at all (missing
# VERCEL_TOKEN or a Vercel API error). See apps/web/README.md.

on:
  push:
    branches: [main]

concurrency:
  group: vercel-logs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - name: Wait for the Vercel deployment of this commit and print its build logs
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: bun scripts/vercel-deploy-logs.ts
