# Upload a recorded gameplay clip (mp4 on the pr-shots archive branch) to
# GitHub's user-attachments store and comment the URL on a PR/issue, where it
# renders with GitHub's NATIVE inline video player.
#
# Why a workflow: cloud agent sessions sit behind an egress gateway that only
# allows repository-scoped GitHub endpoints, so `bun run pr-video` cannot reach
# the github.com/user-attachments upload flow from there. Actions runners have
# open egress — agents push the clip with `bun run pr-shots`, then dispatch
# this workflow (workflow_dispatch / actions_run_trigger MCP).
#
# Requires the GH_SESSION_TOKEN repository Actions secret: a github.com
# `user_session` cookie of an account with write access (dedicated bot account
# recommended — it is a full-account credential). There is no token API for
# attachment uploads; the cookie flow is the only way to mint an inline-playing
# user-attachments URL.
name: pr-video

permissions:
  contents: read

# Two triggers for the same job:
# - workflow_dispatch: the Run-workflow button (or an API caller with
#   actions:write — the agents' GitHub App integration has no such scope).
# - issue_comment (ChatOps): a comment starting with `/pr-video <clip_path>`
#   on any PR or issue. Comment-triggered workflows always run from the
#   default branch, and agents CAN post comments through repository-scoped
#   APIs — this is the trigger agents use. The video lands as a follow-up
#   comment on the same thread. Only comments by users with write/admin
#   access are honored.
on:
  workflow_dispatch:
    inputs:
      clip_path:
        description: "Path of the clip within the pr-shots branch (e.g. pr-shots/claude/foo/game-clip.mp4)"
        required: true
        type: string
      target_number:
        description: "PR or issue number to comment the inline video on (omit to only print the URL)"
        required: false
        type: string
  issue_comment:
    types: [created]

jobs:
  upload:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (startsWith(github.event.comment.body, '/pr-video ') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          ref: pr-shots
          path: _clips
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - name: Guard secret
        run: |
          if [ -z "${{ secrets.GH_SESSION_TOKEN }}" ]; then
            echo "::error::GH_SESSION_TOKEN Actions secret is not set. Add a github.com user_session cookie (bot account with write access) under Settings → Secrets and variables → Actions."
            exit 1
          fi
      - name: Resolve inputs
        id: params
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "clip_path=${{ inputs.clip_path }}" >> "$GITHUB_OUTPUT"
            echo "target_number=${{ inputs.target_number }}" >> "$GITHUB_OUTPUT"
          else
            # ChatOps: `/pr-video <clip_path>` — first line only, target = the thread itself.
            CLIP_ARG="$(printf '%s' "$COMMENT_BODY" | head -1 | sed 's|^/pr-video[[:space:]]*||' | tr -d '[:space:]')"
            [ -n "$CLIP_ARG" ] || { echo "::error::usage: /pr-video <clip_path within the pr-shots branch>"; exit 1; }
            echo "clip_path=$CLIP_ARG" >> "$GITHUB_OUTPUT"
            echo "target_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload clip to user-attachments
        id: upload
        env:
          GH_SESSION_TOKEN: ${{ secrets.GH_SESSION_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CLIP="$GITHUB_WORKSPACE/_clips/${{ steps.params.outputs.clip_path }}"
          [ -f "$CLIP" ] || { echo "::error::clip not found on pr-shots branch: ${{ steps.params.outputs.clip_path }}"; exit 1; }
          # Minimal isolated install: pr-video.ts needs only the user-attachments
          # package, not the monorepo's workspace install.
          mkdir /tmp/pv && cp scripts/pr-video.ts /tmp/pv/
          cd /tmp/pv && echo '{"type":"module"}' > package.json && bun add user-attachments
          URL="$(bun pr-video.ts "$CLIP" --repo "${{ github.repository }}")"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Uploaded: $URL"
      - name: Comment inline video on target
        if: ${{ steps.params.outputs.target_number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          printf 'Gameplay clip (uploaded by the pr-video workflow — plays inline):\n\n%s\n' "${{ steps.upload.outputs.url }}" > body.md
          gh issue comment "${{ steps.params.outputs.target_number }}" --repo "${{ github.repository }}" --body-file body.md
