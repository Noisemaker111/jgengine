name: Mirror Assets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"
  push:
    branches: [main]
    paths:
      - "packages/assets/src/sources/**"
      - "scripts/mirror-assets.ts"
      - ".github/workflows/mirror-assets.yml"

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun scripts/mirror-assets.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
