name: Publish

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish.yml"
      - "packages/*/package.json"
      - "packages/*/src/**"

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Stage the lockstep changelog into each package
        run: for p in core ws sql react convex node shell assets jgengine; do cp CHANGELOG.md "packages/$p/CHANGELOG.md"; done
      - name: Stage per-package skills
        run: bun run stage-skills
      - run: bun run check-artifacts
      - run: bun run build
      - run: bun run check-types
      - run: bun test packages Games
      - name: Publish unpublished packages in dependency order
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for p in core ws sql react convex node shell assets jgengine; do
            name=$(node -p "require('./packages/$p/package.json').name")
            version=$(node -p "require('./packages/$p/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "skip $name@$version (already on npm)"
            else
              echo "publish $name@$version"
              (cd "packages/$p" && npm publish --access public)
            fi
          done
