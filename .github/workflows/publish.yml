name: Publish

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish.yml"
      - "packages/*/package.json"
      - "packages/*/src/**"

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Stage the lockstep changelog into each package
        run: for p in core ws sql react convex node shell assets jgengine; do cp CHANGELOG.md "packages/$p/CHANGELOG.md"; done
      - name: Stage per-package llms.txt
        run: bun run gen-llms
      - run: bun run check-artifacts
      - run: bun run build
      - run: bun run check-types
      - run: bun test packages Games
      - name: Publish unpublished packages in dependency order
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          # TODO: re-add jgengine once the npm token can publish the unscoped
          # name (E403 — the token cannot claim it; owner action required).
          for p in core ws sql react convex node shell assets; do
            name=$(node -p "require('./packages/$p/package.json').name")
            version=$(node -p "require('./packages/$p/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "skip $name@$version (already on npm)"
            else
              echo "publish $name@$version"
              (cd "packages/$p" && npm publish --access public)
            fi
          done
